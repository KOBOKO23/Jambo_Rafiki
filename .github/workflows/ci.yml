name: Frontend CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Bundle budget
        run: npm run budget

      - name: Tests
        run: npm run test:run

      - name: Security audit
        run: npm run audit:ci
